name: Coverage Badge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coverage-badge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-badge:
    name: Generate Coverage Badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests with coverage
        run: |
          go test ./... -race -covermode=atomic -coverprofile=coverage.out

      - name: Calculate coverage percentage
        id: coverage
        run: |
          # Calculate total coverage percentage
          COVERAGE=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          
          # Round to integer
          COVERAGE_INT=$(echo "${COVERAGE}" | awk '{printf "%d", $1+0.5}')
          echo "Rounded Coverage: ${COVERAGE_INT}%"
          
          # Set output
          echo "coverage=${COVERAGE_INT}" >> $GITHUB_OUTPUT
          
          # Determine color
          if [ "${COVERAGE_INT}" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "${COVERAGE_INT}" -ge 50 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "color=${COLOR}" >> $GITHUB_OUTPUT

      - name: Generate badge SVG
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          COLOR=${{ steps.coverage.outputs.color }}
          
          # Create badge SVG
          cat > badge.svg << EOF
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="20">
  <rect width="100" height="20" rx="3" fill="#555"/>
  <rect width="60" height="20" rx="3" fill="#${COLOR}"/>
  <text x="50" y="14" text-anchor="middle" fill="white" font-size="11" font-family="Verdana, Geneva, DejaVu Sans, sans-serif">Coverage</text>
  <text x="30" y="14" text-anchor="middle" fill="white" font-size="11" font-family="Verdana, Geneva, DejaVu Sans, sans-serif">${COVERAGE}%</text>
</svg>
EOF
          
          # For shields.io style badge, we'll use their URL format
          # But we need to update the README with the actual percentage
          echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "COLOR=${COLOR}" >> $GITHUB_ENV

      - name: Update README badge
        run: |
          # Update the README.md with the actual coverage percentage
          sed -i "s/Coverage-XX%25/Coverage-${{ env.COVERAGE }}%25/" README.md
          sed -i "s/brightgreen/${{ env.COLOR }}/" README.md
          
          # Show the updated badge line
          grep "Coverage" README.md

      - name: Commit and push badge update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          git add README.md
          git diff --cached README.md
          
          if ! git diff --cached --quiet README.md; then
            git commit -m "chore: update coverage badge to ${{ env.COVERAGE }}%"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload badge as artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-badge
          path: badge.svg
          if-no-files-found: ignore
